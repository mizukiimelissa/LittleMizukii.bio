<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fujiko.lol</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap');

  :root{
    --hot-pink:   #FF3CAC;
    --tangerine:  #FF9A44;
    --grape:      #7B2FF7;
    --sun:        #FFD23F;
    --ink:        #1B0E2B;
    --paper:      #FFF9F0;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0; padding:0; min-height:100%;
  }

  body{
    font-family:'Space Grotesk', sans-serif;
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    background:
      radial-gradient(circle at 15% 20%, var(--sun) 0%, transparent 45%),
      radial-gradient(circle at 85% 15%, var(--hot-pink) 0%, transparent 50%),
      radial-gradient(circle at 50% 90%, var(--grape) 0%, transparent 55%),
      linear-gradient(135deg, var(--tangerine), var(--hot-pink) 60%, var(--grape));
    background-attachment: fixed;
    overflow-x:hidden;
  }

  /* floating blobs for ambient motion, respecting reduced-motion */
  .blob{
    position:fixed;
    border-radius:50%;
    filter:blur(2px);
    opacity:0.35;
    z-index:0;
    pointer-events:none;
  }
  .blob.b1{ width:180px; height:180px; background:var(--sun); top:8%; left:6%; animation:float1 9s ease-in-out infinite; }
  .blob.b2{ width:120px; height:120px; background:var(--paper); bottom:10%; right:8%; animation:float2 11s ease-in-out infinite; }
  .blob.b3{ width:90px;  height:90px;  background:var(--hot-pink); top:60%; left:2%; animation:float1 7s ease-in-out infinite reverse; }

  @keyframes float1{
    0%,100%{ transform: translateY(0) translateX(0) rotate(0deg); }
    50%{ transform: translateY(-24px) translateX(12px) rotate(8deg); }
  }
  @keyframes float2{
    0%,100%{ transform: translateY(0) translateX(0) rotate(0deg); }
    50%{ transform: translateY(20px) translateX(-14px) rotate(-6deg); }
  }

  @media (prefers-reduced-motion: reduce){
    .blob{ animation: none !important; }
    *{ scroll-behavior:auto !important; }
  }

  .card{
    position:relative;
    z-index:1;
    width:100%;
    max-width:420px;
    background: var(--paper);
    border-radius:28px;
    padding:36px 28px 32px;
    box-shadow: 12px 12px 0 var(--ink);
    border: 3px solid var(--ink);
  }

  .avatar{
    width:96px; height:96px;
    margin:0 auto 18px;
    border-radius:50%;
    background: conic-gradient(from 210deg, var(--hot-pink), var(--tangerine), var(--sun), var(--grape), var(--hot-pink));
    display:flex; align-items:center; justify-content:center;
    border:3px solid var(--ink);
    box-shadow: 5px 5px 0 var(--ink);
  }
  .avatar span{
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:38px;
    color: var(--paper);
    text-shadow: 2px 2px 0 var(--ink);
  }

  h1{
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:28px;
    text-align:center;
    margin:0 0 6px;
    letter-spacing:0.3px;
  }

  .bio{
    text-align:center;
    font-size:14px;
    font-weight:500;
    color: #5b4a72;
    margin:0 0 28px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }
  .bio .lock{
    display:inline-flex;
    width:16px; height:16px;
  }

  .links{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .link-btn{
    position:relative;
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    color:var(--ink);
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:16px;
    padding:16px 18px;
    border-radius:16px;
    border: 2.5px solid var(--ink);
    background: var(--paper);
    box-shadow: 5px 5px 0 var(--ink);
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
  }
  .link-btn:hover{
    transform: translate(-3px,-3px);
    box-shadow: 8px 8px 0 var(--ink);
  }
  .link-btn:active{
    transform: translate(0,0);
    box-shadow: 2px 2px 0 var(--ink);
  }

  .link-btn.telegram{ background: linear-gradient(90deg, #E9F6FF, var(--paper)); }
  .link-btn.tiktok{ background: linear-gradient(90deg, #FFE7F3, var(--paper)); }

  .icon{
    flex-shrink:0;
    width:34px; height:34px;
    border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    color:var(--paper);
  }
  .icon.tg{ background:#29A9EA; }
  .icon.tt{ background:#111; }

  .icon svg{ width:19px; height:19px; }

  .label small{
    display:block;
    font-family:'Space Grotesk', sans-serif;
    font-weight:400;
    font-size:11.5px;
    color:#7a6a92;
    margin-top:2px;
  }

  footer{
    margin-top:28px;
    text-align:center;
    font-size:11px;
    color:#a695bd;
    font-family:'Space Grotesk', sans-serif;
  }

  @media (max-width: 380px){
    .card{ padding:28px 18px 24px; }
    h1{ font-size:24px; }
  }
</style>
</head>
<body>

  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <main class="card">
    <div class="avatar"><span>F</span></div>
    <h1>fujiko.lol</h1>
    <p class="bio">
      <svg class="lock" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="11" width="14" height="9" rx="2" stroke="#5b4a72" stroke-width="2"/>
        <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="#5b4a72" stroke-width="2"/>
      </svg>
      private page
    </p>

    <div class="links">
      <a class="link-btn telegram" href="https://t.me/+Ei-VvP6dkaAzNGQ0" target="_blank" rel="noopener noreferrer">
        <span class="icon tg">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.5 3.5 2.7 10.8c-1 .4-1 1.7.1 2l4.6 1.5 1.8 5.6c.2.7 1 .9 1.6.4l2.6-2.3 4.6 3.4c.7.5 1.7.1 1.9-.7l3.4-15.7c.2-1-.8-1.7-1.7-1.5Z"/></svg>
        </span>
        <span class="label">Telegram<small>Join the channel</small></span>
      </a>

      <a class="link-btn tiktok" href="https://www.tiktok.com/@fujiko.lol" target="_blank" rel="noopener noreferrer">
        <span class="icon tt">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.6 5.2c-.7-.7-1.1-1.7-1.1-2.7h-3.1v13.4c0 1.4-1.1 2.5-2.5 2.5s-2.5-1.1-2.5-2.5 1.1-2.5 2.5-2.5c.3 0 .5 0 .8.1v-3.2c-.3 0-.5-.1-.8-.1-3.1 0-5.6 2.5-5.6 5.6s2.5 5.6 5.6 5.6 5.6-2.5 5.6-5.6V9.1c1.2.9 2.7 1.4 4.3 1.4V7.4c-1.2 0-2.3-.5-3.2-1.3Z"/></svg>
        </span>
        <span class="label">TikTok<small>@fujiko.lol</small></span>
      </a>
    </div>

    <footer>self-hosted · no trackers · no third-party analytics</footer>
  </main>

</body>
</html>
